server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for hashed assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable cache on the entry point so new builds reach the browser.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
